<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <!-- Concept 2: "t" with a data pulse/trend line cutting through -->
  <!-- Square container -->
  <rect x="4" y="4" width="48" height="48" rx="10" fill="#1E293B"/>
  <!-- Trend line going up through the square -->
  <polyline points="12,40 20,36 28,24 36,28 44,14" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Data point at peak -->
  <circle cx="44" cy="14" r="3.5" fill="#16A34A"/>
  <!-- "t" letter subtly in white -->
  <text x="18" y="42" font-family="Inter, -apple-system, sans-serif" font-size="30" font-weight="700" fill="rgba(255,255,255,0.15)">t</text>
  <!-- Wordmark -->
  <text x="62" y="38" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1E293B">tofia</text>
  <text x="152" y="38" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="300" fill="#6B7280">analytics</text>
</svg>
