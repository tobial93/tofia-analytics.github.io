<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <!-- Concept 3: Connected data nodes forming an abstract "t" shape -->
  <!-- Vertical nodes (stem of t) -->
  <circle cx="24" cy="10" r="5" fill="#2563EB"/>
  <circle cx="24" cy="30" r="6" fill="#1E293B"/>
  <circle cx="24" cy="50" r="5" fill="#2563EB"/>
  <!-- Horizontal nodes (crossbar of t) -->
  <circle cx="8" cy="30" r="4" fill="#2563EB" opacity="0.6"/>
  <circle cx="42" cy="30" r="4" fill="#16A34A"/>
  <!-- Connection lines -->
  <line x1="24" y1="15" x2="24" y2="24" stroke="#1E293B" stroke-width="1.5"/>
  <line x1="24" y1="36" x2="24" y2="45" stroke="#1E293B" stroke-width="1.5"/>
  <line x1="12" y1="30" x2="18" y2="30" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="30" y1="30" x2="38" y2="30" stroke="#2563EB" stroke-width="1.5"/>
  <!-- Diagonal data connection -->
  <line x1="29" y1="25" x2="38" y2="16" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="40" cy="14" r="2.5" fill="#E5E7EB"/>
  <!-- Wordmark -->
  <text x="58" y="38" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#1E293B">tofia</text>
  <text x="148" y="38" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="300" fill="#6B7280">analytics</text>
</svg>
